name = "eline-line-webhook"
main = "worker.js"
compatibility_date = "2025-01-01"

# worker เช็คเวลาเองจากตาราง SCHEDULE ว่าต้องส่งอะไร
[triggers]
crons = ["*/5 * * * *"]  # ทุก 5 นาที — รองรับ routine ที่ห่างกัน 5/15 นาที + กัน cron คลาดนาที

# State รายวัน — จำบทสนทนาเช้า (ตื่นยัง / อาการ / ไปทำงานไหม)
[[kv_namespaces]]
binding = "STATE"
id = "48ce4bb36c014814bfff8a49bef31bad"

# Secrets (ตั้งด้วยคำสั่ง ไม่เก็บในไฟล์):
#   npx wrangler secret put LINE_TOKEN
#   npx wrangler secret put ANTHROPIC_API_KEY
#   npx wrangler secret put LINE_SECRET
#   npx wrangler secret put GITHUB_TOKEN
#   npx wrangler secret put LINE_USER_ID
