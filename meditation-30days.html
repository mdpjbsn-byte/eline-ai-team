days:[
{day:1,t:"รู้จักสมอง & ทำไมต้องสมาธิ",th:"สมองไม่รู้ความต่างระหว่างจินตนาการกับความจริง นี่คือพื้นฐานของ Dispenza Neural pathways ที่ใช้บ่อยจะแข็งแรงขึ้น ฝึกใหม่บ่อยพอก็สร้าง pathway ใหม่ได้ วันนี้เรียนหายใจ Box Breathing ก่อน",m:"Box Breathing 10 นาที: หายใจเข้า 4 วิ → กลั้น 4 วิ → ออก 4 วิ → กลั้น 4 วิ ทำ 10 รอบ แล้วนั่งเงียบ 10 นาที สังเกตความคิดที่วิ่งเข้ามา",a:"Segment Intending: ก่อนทำสิ่งใด ๆ หยุด 30 วิ ตั้งใจว่าต้องการให้กิจกรรมนั้นเป็นอย่างไร",e:"เขียน Journal 20 นาที ตอบคำถาม journal prompt",j:"ฉันรู้สึกว่าตัวเองเป็นคนแบบไหน? มีความเชื่ออะไรเกี่ยวกับตัวเองที่ไม่แน่ใจว่าจริงหรือเปล่า?"},

{day:19,t:"Time Collapse — อนาคตคือตอนนี้",th:"Dispenza บอกว่าใน quantum field ไม่มี linear time อนาคตที่ต้องการมีอยู่แล้วในฐานะ potential เมื่อ collapse potential ด้วย observation + feeling มันกลายเป็น reality ปัจจุบัน",m:"Tuning Into New Potentials 30 นาที เน้นที่ความรู้สึกว่า 'มันมีอยู่แล้ว ตอนนี้' | Heart Coherence 10 นาที",a:"ดำเนิน Living in the End เต็มวัน ทุก decision ทุก conversation",e:"SATS scene ที่เลือก | I Remember When ก่อนหลับ",j:"ถ้า Her มีชีวิตอยู่ตอนนี้ วันนี้เธอทำอะไรต่างจากที่ฉันทำ?"},
{day:20,t:"Handling Doubt — เมื่อไม่เชื่อ",th:"Doubt คือ feedback ไม่ใช่ failure มันบอกว่ายังมี belief ที่ conflict อยู่ Neville บอกว่าอย่า fight doubt แต่ให้ redirect attention ไปที่ evidence ที่ต้องการแทน",m:"Focus Wheel ทำกับ doubt ที่มีอยู่ตอนนี้ | Heart Coherence 10 นาที",a:"ทุกครั้งที่ doubt ผุดขึ้น พูด Isn't It Wonderful แทน",e:"Rampage of Appreciation เน้นที่ evidence เล็ก ๆ ที่ Her เริ่ม show up แล้ว",j:"Doubt ที่เจอบ่อยที่สุดคืออะไร? ถ้า Her ได้ยิน doubt นั้น เธอจะตอบยังไง?"},

{day:22,t:"Morning Routine ของ Her",th:"วันนี้ set morning routine ของ Her ที่จะทำตลอดชีวิต ไม่ใช่ routine ของ 'ฉันที่กำลังฝึก' แต่คือ routine ของ Her ที่เป็นอยู่แล้ว",m:"Dispenza Morning Meditation 30–40 นาที: gratitude + Heart Coherence + Visualization ชีวิตของ Her | Mirror Work 5 นาที",a:"Segment Intending ทุก segment จาก state ของ Her",e:"Dispenza Evening Meditation 20 นาที | SATS",j:"Morning routine ของ Her เป็นอย่างไร? เธอตื่นมาด้วย feeling อะไร?"},

{day:25,t:"Surrender — ปล่อยให้ Universe จัดการ",th:"Paradox ของ manifestation: ยิ่ง force มาก ยิ่งได้ช้า เพราะ force = ไม่เชื่อว่ามีแล้ว Abraham Hicks บอกว่า 'Let go of the oars' Surrender ไม่ใช่แพ้ แต่คือความไว้ใจสูงสุด",m:"Tuning Into New Potentials 30 นาที เน้นที่ 'ปล่อยวาง how และ when' | Heart Coherence",a:"ทุกครั้งที่รู้สึก 'ต้องควบคุม' หายใจลึก แล้วพูดว่า 'Universe จัดการแทนฉันได้'",e:"Rampage of Appreciation เต็มรูปแบบ 20 นาที",j:"ฉัน trust Universe แค่ไหน 1–10? อะไรที่ทำให้ยังไม่ trust เต็มที่?"},
{day:26,t:"Embodiment — ใส่ Her ในทุกการกระทำ",th:"Embodiment ต่างจาก visualization ไม่ใช่แค่เห็นในหัว แต่คือการที่ร่างกาย walk, talk, sit, breathe ในแบบของ Her ทุก gesture ทุก word choice",m:"Morning Meditation 30 นาที | ก่อนลุกจากเตียง breathing exercise ในฐานะ Her",a:"Practice: Her เดินยังไง? นั่งยังไง? พูดกับคนอื่นยังไง? ทำทุกอย่างในแบบของเธอ",e:"Evening Meditation 20 นาที | SATS",j:"ร่างกายของ Her รู้สึกต่างจากร่างกายของ 'ฉัน' ยังไง? เธอ carry herself ยังไง?"},

// ===== COURSE LOGIC =====
const wCols=['#1565c0','#6a1b9a','#2e7d32','#e65100'];
let cW=0,cD=0;
const checks={};

function showSec(id){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.getElementById('sec-'+id).classList.add('on');
  document.getElementById('nav-course').classList.toggle('active',id==='course');
  document.getElementById('nav-guide').classList.toggle('active',id==='guide');
}

function switchWeek(w){
  cW=w; cD=0;
  [0,1,2,3].forEach(i=>{
    const el=document.getElementById('wt'+i);
    el.className='wt'+i+(i===w?' on':'');
  });
  renderOv(); renderScroll(); renderCard();
}

function renderOv(){
  const w=weeks[cW];
  document.getElementById('week-ov').innerHTML=`<div class="wo wo${cW}"><h3>${w.title}</h3>${w.theory}</div>`;
}

function renderScroll(){
  const w=weeks[cW];
  document.getElementById('day-scroll').innerHTML=w.days.map((d,i)=>
    `<button class="db${cW}${i===cD?' on':''}" onclick="switchDay(${i})">${d.day}</button>`
  ).join('');
}

function switchDay(i){
  cD=i; renderScroll(); renderCard();
}

function renderCard(){
  const w=weeks[cW]; const d=w.days[cD]; const col=wCols[cW];
  let html=`<div class="day-card">
    <div class="day-title">วันที่ ${d.day}: ${d.t}</div>
    <div class="lbl">ทฤษฎีวันนี้</div>
    <div class="theory-box">${d.th}</div>
    <div class="lbl">ปฏิบัติ</div>
    <div class="prac-col">
      <div class="pi pi-m"><b>🌅 เช้า</b>${d.m}</div>
      <div class="pi pi-a"><b>☀️ กลางวัน</b>${d.a}</div>
      <div class="pi pi-e"><b>🌙 คืน</b>${d.e}</div>
    </div>
    <div class="lbl">Journal Prompt</div>
    <div class="jbox">✍️ ${d.j}</div>`;
  if(d.r){
    html+=`<div class="review-box"><h4>✅ Weekly Checklist</h4>`;
    w.review.forEach((r,i)=>{
      const key=`${cW}-${i}`;
      const on=checks[key]?' on':'';
      html+=`<div class="ck-row"><button class="ck${on}" id="ck${key}" onclick="toggleCk(${cW},${i})">${checks[key]?'✓':''}</button><span>${r}</span></div>`;
    });
    html+=`</div>`;
  }
  html+=`<div class="nav-row" style="margin-top:16px">
    <button onclick="navDay(-1)" ${cD===0?'disabled':''}>← ก่อนหน้า</button>
    <span>วันที่ ${d.day} / 30</span>
    <button onclick="navDay(1)" ${cD===w.days.length-1?'disabled':''}>ถัดไป →</button>
  </div></div>`;
  document.getElementById('day-card').innerHTML=html;
}

function navDay(dir){
  const w=weeks[cW]; const nd=cD+dir;
  if(nd<0){if(cW>0){switchWeek(cW-1);cD=weeks[cW].days.length-1;renderScroll();renderCard();}return;}
  if(nd>=w.days.length){if(cW<3)switchWeek(cW+1);return;}
  switchDay(nd);
}

function toggleCk(w,i){
  const key=`${w}-${i}`;
  checks[key]=!checks[key];
  renderCard();
}

// ===== GUIDE LOGIC =====
const cats=Object.keys(guide);
let gCat='base';

function renderCatTabs(){
  document.getElementById('cat-tabs').innerHTML=cats.map(c=>
    `<button class="${guide[c].cls}${c===gCat?' on':''}" onclick="switchCat('${c}')">${guide[c].label}</button>`
  ).join('');
}

function renderTechList(){
  const cat=guide[gCat];
  document.getElementById('tech-list').innerHTML=cat.techs.map((t,i)=>
    `<button onclick="openTech(${i})" style="border-color:${cat.color}">
      <div class="tname">${t.name}</div>
      <div class="twhen">⏰ ${t.when} · ${t.dur}</div>
    </button>`
  ).join('');
}

function switchCat(c){gCat=c;renderCatTabs();renderTechList();}

function openTech(i){
  const cat=guide[gCat]; const t=cat.techs[i]; const col=cat.color;
  let html=`<div class="detail-card">
    <div class="detail-title">${t.name}</div>
    <div class="detail-meta">⏱️ ${t.dur} &nbsp;·&nbsp; 📌 ${t.when}</div>
    <div class="desc-box">${t.desc}</div>
    <div class="tools-row">${t.tools.map(x=>`<span class="tool">${x}</span>`).join('')}</div>
    <div class="lbl" style="margin-bottom:12px">ขั้นตอนการทำ</div>`;
  t.steps.forEach((s,idx)=>{
    html+=`<div class="step">
      <div class="snum" style="background:${col}">${idx+1}</div>
      <div class="sbody">
        <div class="slbl">${s.l}</div>
        <div class="sdet">${s.d}</div>
        ${s.tip?`<div class="stip">💡 ${s.tip}</div>`:''}
      </div>
    </div>`;
  });
  if(t.mistakes){
    html+=`<div class="mistakes"><h5>⚠️ ข้อผิดพลาดที่พบบ่อย</h5>
      ${t.mistakes.map(m=>`<p>⚠️ ${m}</p>`).join('')}
    </div>`;
  }
  html+=`</div>`;
  document.getElementById('gdetail-content').innerHTML=html;
  document.getElementById('glist').style.display='none';
  document.getElementById('gdetail').style.display='block';
  window.scrollTo(0,0);
}

function backToList(){
  document.getElementById('glist').style.display='block';
  document.getElementById('gdetail').style.display='none';
}

// ===== INIT =====
switchWeek(0);
renderCatTabs();
renderTechList();
</script>
